<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas | SMS Studios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
background:#000;
color:#fff;
font-family:Poppins;
text-align:center;
margin:0;
}

h1{margin:20px;}

.container{
padding:10px;
max-width:600px;
margin:auto;
}

.card{
background:#111;
margin:10px 0;
border-radius:15px;
overflow:hidden;
transition:.3s;
}

.header{
padding:15px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.detalle{
max-height:0;
overflow:hidden;
transition:max-height .4s ease;
padding:0 15px;
text-align:left;
}

.card.active .detalle{
max-height:300px;
padding:15px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#00f5ff;
border-radius:10px;
cursor:pointer;
}

@media(max-width:600px){
.header{flex-direction:column;align-items:flex-start;}
}
</style>
</head>

<body>

<h1>Historial de Ventas</h1>

<a href="pos.html"><button>Volver</button></a>

<div class="container" id="ventas"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSy...",projectId:"sms-studios-web"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

db.collection("ventas").orderBy("fecha","desc")
.onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{
let d=doc.data();

html+=`
<div class="card">
<div class="header" onclick="toggle(this)">
<strong>Total: $${d.total}</strong>
<span>▼</span>
</div>

<div class="detalle">

${d.productos.map(p=>`<p>${p.nombre} - $${p.precio}</p>`).join("")}

<button onclick='ticket(${JSON.stringify(d.productos)},${d.total})'>Descargar ticket</button>
<button onclick="eliminar('${doc.id}')">Eliminar</button>

</div>
</div>
`;
});

ventas.innerHTML=html;

});

function toggle(el){
el.parentElement.classList.toggle("active");
}

function eliminar(id){
if(confirm("¿Eliminar venta?")){
db.collection("ventas").doc(id).delete();
}
}

/* PDF */
function ticket(productos,total){

const { jsPDF } = window.jspdf;
const doc=new jsPDF();

doc.setFont("courier");
let y=20;

doc.text("SMS STUDIOS",105,y,null,null,"center"); y+=10;

productos.forEach(p=>{
doc.text(p.nombre,10,y);
doc.text("$"+p.precio,190,y,null,null,"right");
y+=8;
});

doc.text("----------------------",10,y); y+=8;
doc.text("TOTAL: $"+total,10,y);

doc.save("ticket.pdf");
}
</script>

</body>
</html>
