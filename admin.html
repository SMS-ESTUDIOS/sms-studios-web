<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | SMS Studios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
background:#000;
color:#fff;
font-family:Poppins;
margin:0;
text-align:center;
}

h1{margin:20px;}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

.form{
background:#111;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input{
width:30%;
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
padding:8px 15px;
border:none;
background:#00f5ff;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:#111;
padding:15px;
border-radius:15px;
text-align:left;
}

.card input{
width:100%;
margin:5px 0;
}

@media(max-width:700px){
input{width:90%;}
}
</style>
</head>

<body>

<h1>Panel Admin</h1>

<div class="container">

<div class="form">
<input id="nombre" placeholder="Nombre">
<input id="precio" type="number" placeholder="Precio">
<input id="categoria" placeholder="Categoría">
<br>
<button onclick="guardar()">Agregar</button>
</div>

<div class="grid" id="listaProductos"></div>

<a href="pos.html"><button>Volver</button></a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSy...",projectId:"sms-studios-web"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function guardar(){
if(!nombre.value||!precio.value||!categoria.value)return alert("Llena todo");

db.collection("productos").add({
nombre:nombre.value,
precio:parseInt(precio.value),
categoria:categoria.value
});

nombre.value="";precio.value="";categoria.value="";
}

db.collection("productos").onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{
let p=doc.data();

html+=`
<div class="card">
<input id="n${doc.id}" value="${p.nombre}">
<input id="p${doc.id}" value="${p.precio}">
<input id="c${doc.id}" value="${p.categoria}">

<button onclick="editar('${doc.id}')">Guardar</button>
<button onclick="eliminar('${doc.id}')">Eliminar</button>
</div>
`;
});

listaProductos.innerHTML=html;

});

function editar(id){
db.collection("productos").doc(id).update({
nombre:document.getElementById("n"+id).value,
precio:parseInt(document.getElementById("p"+id).value),
categoria:document.getElementById("c"+id).value
});
}

function eliminar(id){
db.collection("productos").doc(id).delete();
}
</script>

</body>
</html>
